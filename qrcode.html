<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Bounce Animator QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#fdf0ff; font-family:-apple-system,sans-serif; margin:0; }
  .card { background:white; border-radius:24px; padding:40px; box-shadow:0 12px 40px rgba(147,51,234,0.15); text-align:center; max-width:400px; }
  h1 { color:#9333ea; font-size:24px; margin:0 0 4px; }
  p { color:#7a5c8a; font-size:14px; margin:0 0 24px; }
  #qr-wrap { display:inline-block; border-radius:12px; overflow:hidden; }
  #qr-wrap img, #qr-wrap canvas { display:block; }
  .url { margin-top:20px; font-size:12px; color:#b48ab4; word-break:break-all; }
  .url a { color:#9333ea; text-decoration:none; font-weight:700; }
  .badge { margin-top:16px; background:linear-gradient(135deg,#f9a8d4,#9333ea); color:white; padding:8px 20px; border-radius:20px; font-size:13px; font-weight:700; display:inline-block; }
</style>
</head>
<body>
<div class="card">
  <h1>Bounce Animator</h1>
  <p>QR코드를 스캔하면 앱을 열 수 있어요!</p>
  <div id="qr-wrap"></div>
  <div class="url"><a href="https://amtlhm518-jpg.github.io/bounce-animator/" target="_blank">https://amtlhm518-jpg.github.io/bounce-animator/</a></div>
  <div class="badge">스캔하여 설치하기</div>
</div>
<script>
  const qr = qrcode(0, 'L');
  qr.addData('https://amtlhm518-jpg.github.io/bounce-animator/');
  qr.make();
  document.getElementById('qr-wrap').innerHTML = qr.createSvgTag(8, 0);
</script>
</body>
</html>
